<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>双色球历史开奖号码共现分析工具</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>if(!window.XLSX){document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"><\/script>')}</script>
<style>
*{box-sizing:border-box}body{margin:0;background:#f3f6fb;color:#122033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.wrap{max-width:1320px;margin:auto;padding:34px 22px}.head{text-align:center;margin-bottom:26px}.head h1{font-size:38px;margin:0 0 12px;font-weight:900}.head p{font-size:19px;color:#667085;line-height:1.7}.grid{display:grid;grid-template-columns:380px 1fr;gap:20px}.card{background:white;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 18px 50px rgba(15,23,42,.08);padding:22px}.card h2{font-size:30px;margin:0 0 20px}.upload{border:2px dashed #c4d1e3;border-radius:18px;padding:22px;text-align:center;background:#f8fafc}.upload b{font-size:22px}.hint{color:#667085;font-size:13px;line-height:1.6}.file{display:block;width:100%;margin-top:16px;border:2px solid #111827;border-radius:14px;background:#111827;color:white;padding:14px;font-size:15px;cursor:pointer}label{display:block;font-weight:900;font-size:14px;margin:14px 0 6px}select,input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;font-size:15px;background:white;color:#111827}textarea{height:130px;resize:vertical}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:14px;padding:12px 15px;font-weight:900;font-size:15px;cursor:pointer}.red{background:#df1f44;color:white}.blue{background:#2675e8;color:white}.green{background:#17a66f;color:white}.dark{background:#111827;color:white}.gray{background:#e9eef6;color:#111827}.log{margin-top:14px;background:#081426;color:#c9ffde;border-radius:16px;padding:14px;white-space:pre-wrap;line-height:1.6;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.stat{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:18px}.stat b{font-size:34px;display:block}.stat span{font-weight:900}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.tab{background:#e9eef6}.tab.on{background:#111827;color:white}.empty{border:1px dashed #cbd5e1;background:#fafcff;border-radius:18px;min-height:180px;display:grid;place-items:center;color:#667085;font-size:18px}.table{overflow:auto;max-height:650px;border:1px solid #dbe3ee;border-radius:18px}table{border-collapse:collapse;width:100%;min-width:980px}th,td{padding:12px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top;font-size:14px}th{position:sticky;top:0;background:#f8fafc}.rank{font-weight:900;color:#9a6510}.combo{font-weight:900;font-size:16px}.count{font-weight:900;font-size:18px}.rnum{color:#df1f44}.bnum{color:#2675e8}.small{font-size:12px;color:#667085;line-height:1.6}.footer{text-align:center;color:#7b8798;font-size:13px;margin-top:22px}@media(max-width:900px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.head h1{font-size:29px}.head p{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>双色球历史开奖号码共现分析工具 🔴🔵</h1><p>上传历史开奖表，统计同一期里同时出现的 3 个、4 个、5 个号码组合，输出出现次数、出现期号、最近期号，并可下载 Excel。</p></div>
  <div class="grid">
    <aside class="card"><h2>① 放入表格</h2><div class="upload"><b>上传 Excel / CSV</b><p class="hint">直接点击下面黑色文件按钮选择表格。这个版本专门修复了表头不规则导致无法识别的问题。</p><input id="file" class="file" type="file" accept=".xlsx,.xls,.csv"></div><label>工作表</label><select id="sheet"><option>先上传文件</option></select><label>统计范围</label><select id="mode"><option value="red">只统计红球号码，推荐</option><option value="color">红球 + 蓝球，区分颜色</option><option value="plain">红球 + 蓝球，不区分颜色</option></select><label>显示前 N 条</label><input id="topn" type="number" min="1" value="10"><label>最少出现次数</label><input id="minc" type="number" min="1" value="1"><label>手动输入或追加数据</label><textarea id="manual" placeholder="每行一条：期号,日期,01 02 03 04 05 06 + 07"></textarea><div class="btns"><button class="red" id="go">开始统计</button><button class="blue" id="manualGo">只分析手动数据</button><button class="green" id="appendGo">追加手动数据后统计</button><button class="gray" id="demo">试用示例数据</button><button class="gray" id="clear">清空</button></div><div class="btns"><button class="dark" id="down">下载结果 Excel</button></div><div class="log" id="log">等待上传表格。</div></aside>
    <main><div class="stats"><div class="stat"><b id="s0">0</b><span>识别期数</span></div><div class="stat"><b id="s3">0</b><span>3号码组合</span></div><div class="stat"><b id="s4">0</b><span>4号码组合</span></div><div class="stat"><b id="s5">0</b><span>5号码组合</span></div></div><section class="card"><h2>② 高频组合前 N 名</h2><div class="tabs"><button class="tab on" data-k="3">3 个号码同时出现</button><button class="tab" data-k="4">4 个号码同时出现</button><button class="tab" data-k="5">5 个号码同时出现</button></div><label>搜索组合或期号</label><input id="q" placeholder="例如 01-02-03 或 2023001"><br><br><div id="out" class="empty">暂无结果。</div></section></main>
  </div><div class="footer">本工具只在浏览器本地分析数据，不上传文件到服务器。</div>
</div>
<script>
let wb=null,rows=[],records=[],res={3:[],4:[],5:[]},cur=3;const $=id=>document.getElementById(id);const log=t=>$('log').textContent=t;
function cell(x){if(x instanceof Date)return x.toISOString().slice(0,10);return String(x==null?'':x).trim()}
function pad(n){return String(n).padStart(2,'0')}
function dateLike(s){s=cell(s);return /^\d{4}[-/.年]/.test(s)||/^\d{1,2}[-/.月]\d{1,2}/.test(s)}
function excelDate(n){if(typeof n==='number'&&n>20000&&n<60000){let d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().slice(0,10)}return ''}
function issueFromRow(row){for(let i=0;i<Math.min(row.length,4);i++){let s=cell(row[i]);let m=s.match(/\b\d{6,8}\b/);if(m&&parseInt(m[0])>100000)return m[0]}return ''}
function dateFromRow(row){for(let i=0;i<Math.min(row.length,5);i++){let v=row[i],s=cell(v);if(v instanceof Date)return cell(v);if(dateLike(s))return s;let ed=excelDate(v);if(ed)return ed}return ''}
function numsFromCell(v){if(v instanceof Date)return[];if(typeof v==='number'){if(Number.isInteger(v)&&v>=1&&v<=33)return[pad(v)];return[]}let s=cell(v);if(!s||dateLike(s))return[];if(/^\d{6,8}$/.test(s))return[];let arr=s.match(/\d{1,2}/g)||[];return arr.map(x=>parseInt(x,10)).filter(n=>n>=1&&n<=33).map(pad)}
function parseRows(a){let out=[];for(let r=0;r<a.length;r++){let row=a[r]||[];let txt=row.map(cell).join('|');if(!txt.trim())continue;let issue=issueFromRow(row);let isHeader=/双色球|历史|汇总|期号|日期|红球|蓝球|开奖号码|号码|#1|#2|#3|#4|#5|#6/i.test(txt);let ns=[];for(let c=0;c<row.length;c++){let s=cell(row[c]);if(issue&&s.includes(issue))continue;if(dateLike(s))continue;let ed=excelDate(row[c]);if(ed)continue;ns.push(...numsFromCell(row[c]))}if(isHeader&&!issue)continue;let unique=[];for(let x of ns){if(!unique.includes(x))unique.push(x)}if(unique.length>=6){let red=unique.slice(0,6).sort((a,b)=>+a-+b);let blue=[];if(unique.length>=7&&+unique[6]>=1&&+unique[6]<=16)blue=[unique[6]];out.push({issue:issue||String(out.length+1),date:dateFromRow(row),red,blue})}}
return out}
function parseManual(){let out=[];$('manual').value.split(/\n+/).forEach(line=>{line=cell(line);if(!line)return;let parts=line.split(/[，,\t]/).map(cell).filter(Boolean),issue='',date='',txt=line;if(parts.length>=3){issue=parts[0];date=parts[1];txt=parts.slice(2).join(' ')}let sp=txt.split(/[+＋]/);let red=numsFromCell(sp[0]).slice(0,6).sort((a,b)=>+a-+b);let blue=sp[1]?numsFromCell(sp[1]).filter(x=>+x<=16).slice(0,1):[];if(red.length>=5)out.push({issue:issue||String(out.length+1),date,red,blue})});return out}
function chosen(r){let m=$('mode').value;if(m==='red')return r.red.map(x=>'R'+x);if(m==='color')return r.red.map(x=>'R'+x).concat(r.blue.map(x=>'B'+x));return [...new Set(r.red.concat(r.blue))].sort((a,b)=>+a-+b).map(x=>'N'+x)}
function comb(a,k,s=0,p=[],o=[]){if(p.length===k){o.push(p.slice());return o}for(let i=s;i<=a.length-(k-p.length);i++){p.push(a[i]);comb(a,k,i+1,p,o);p.pop()}return o}
function comboLabel(c){return c.map(x=>x[0]==='B'?'蓝'+x.slice(1):x.slice(1)).join('-')}
function analyze(list){records=list;let maps={3:new Map(),4:new Map(),5:new Map()};for(let rec of records){let arr=chosen(rec);[3,4,5].forEach(k=>{if(arr.length>=k)comb(arr,k).forEach(c=>{let key=c.join('|');if(!maps[k].has(key))maps[k].set(key,{combo:comboLabel(c),count:0,issues:[],dates:[]});let v=maps[k].get(key);v.count++;v.issues.push(rec.issue);if(rec.date)v.dates.push(rec.date)})})}let min=parseInt($('minc').value||1);[3,4,5].forEach(k=>{res[k]=[...maps[k].values()].filter(x=>x.count>=min).sort((a,b)=>b.count-a.count||a.combo.localeCompare(b.combo,'zh',{numeric:true}));res[k].forEach((x,i)=>{x.rank=i+1;x.issueList=x.issues.join('、');x.dateList=[...new Set(x.dates)].join('、');x.lastIssue=x.issues[x.issues.length-1]||'';x.lastDate=x.dates[x.dates.length-1]||''})});$('s0').textContent=records.length;$('s3').textContent=res[3].length;$('s4').textContent=res[4].length;$('s5').textContent=res[5].length;draw();log('分析完成。\n识别开奖期数：'+records.length+'\n3号码组合：'+res[3].length+'\n4号码组合：'+res[4].length+'\n5号码组合：'+res[5].length)}
function esc(s){return cell(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function paint(s){return esc(s).replace(/蓝\d{2}/g,m=>'<span class="bnum">'+m+'</span>').replace(/(^|-)(\d{2})/g,(m,a,b)=>a+'<span class="rnum">'+b+'</span>')}
function draw(){let n=parseInt($('topn').value||10),q=cell($('q').value).toLowerCase();let arr=res[cur]||[];if(q)arr=arr.filter(x=>x.combo.toLowerCase().includes(q)||x.issueList.toLowerCase().includes(q));arr=arr.slice(0,n);if(!arr.length){$('out').className='empty';$('out').textContent='暂无结果。';return}$('out').className='table';$('out').innerHTML='<table><thead><tr><th>排名</th><th>号码组合</th><th>出现次数</th><th>最近期号</th><th>最近日期</th><th>出现期号</th></tr></thead><tbody>'+arr.map(x=>'<tr><td class="rank">'+x.rank+'</td><td class="combo">'+paint(x.combo)+'</td><td class="count">'+x.count+' 次</td><td>'+esc(x.lastIssue)+'</td><td>'+esc(x.lastDate)+'</td><td class="small">'+esc(x.issueList)+'</td></tr>').join('')+'</tbody></table>'}
function exportX(){if(!records.length){log('没有可导出的结果，请先统计。');return}let book=XLSX.utils.book_new(),n=parseInt($('topn').value||10);[3,4,5].forEach(k=>{let data=res[k].map(x=>({'排名':x.rank,'号码组合':x.combo,'出现次数':x.count,'最近期号':x.lastIssue,'最近开奖日期':x.lastDate,'出现期号':x.issueList,'出现日期':x.dateList}));XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data.slice(0,n)),k+'号码前'+n+'名');XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data),k+'号码全量')});XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(records.map(x=>({'期号':x.issue,'开奖日期':x.date,'红球':x.red.join(' '),'蓝球':x.blue.join(' ')}))),'识别数据');XLSX.writeFile(book,'双色球号码共现分析结果.xlsx')}
async function loadFile(f){try{if(!window.XLSX){log('Excel解析库未加载成功，请刷新网页。');return}let buf=await f.arrayBuffer();wb=XLSX.read(buf,{type:'array',cellDates:true});$('sheet').innerHTML='';wb.SheetNames.forEach(s=>{$('sheet').innerHTML+='<option>'+s+'</option>'});readSheet();log('已上传：'+f.name+'\n已读取工作表：'+$('sheet').value+'\n点击“开始统计”。')}catch(e){log('读取文件失败：'+e.message)}}
function readSheet(){if(!wb)return;rows=XLSX.utils.sheet_to_json(wb.Sheets[$('sheet').value],{header:1,defval:'',raw:true});}
$('file').addEventListener('change',e=>{if(e.target.files&&e.target.files[0])loadFile(e.target.files[0])});$('sheet').onchange=()=>{readSheet();log('已切换工作表：'+$('sheet').value)};$('go').onclick=()=>{if(!rows.length){log('请先上传表格。');return}let r=parseRows(rows);if(!r.length){log('仍未识别到开奖数据。请把表头或前5行截图发我，我会按你的表格固定适配。')}else analyze(r)};$('manualGo').onclick=()=>{let r=parseManual();if(!r.length){log('未识别到手动数据。')}else analyze(r)};$('appendGo').onclick=()=>{let base=rows.length?parseRows(rows):[],extra=parseManual();if(!base.length&&!extra.length){log('请先上传表格或输入手动数据。')}else analyze(base.concat(extra))};$('down').onclick=exportX;$('clear').onclick=()=>location.reload();$('q').oninput=draw;$('topn').oninput=draw;$('minc').onchange=()=>{if(records.length)analyze(records)};$('mode').onchange=()=>{if(records.length)analyze(records)};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');cur=parseInt(b.dataset.k);draw()});$('demo').onclick=()=>analyze([{issue:'2025001',date:'2025-01-02',red:['01','06','12','18','26','31'],blue:['09']},{issue:'2025002',date:'2025-01-05',red:['01','06','13','18','22','31'],blue:['04']},{issue:'2025003',date:'2025-01-09',red:['01','06','12','19','26','31'],blue:['11']},{issue:'2025004',date:'2025-01-12',red:['02','06','12','18','26','31'],blue:['09']}]);
</script>
</body>
</html>
