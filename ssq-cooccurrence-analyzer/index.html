<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>双色球号码共现分析工具</title><script src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'></script><style>body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,Arial;color:#152033}header{text-align:center;padding:32px 16px 14px}h1{margin:0;font-size:34px}p{color:#667085}.box{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:340px 1fr;gap:16px}.card{background:white;border:1px solid #e5e7eb;border-radius:20px;box-shadow:0 15px 40px #0001;padding:18px}.drop{border:2px dashed #cbd5e1;border-radius:16px;padding:22px;text-align:center;background:#f8fafc;cursor:pointer}.drop:hover{background:white;border-color:#d71920}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #d0d5dd;border-radius:12px;padding:10px;margin-top:6px}label{font-weight:700;font-size:13px;margin-top:12px;display:block}textarea{height:120px}button{border:0;border-radius:12px;padding:11px 13px;margin:8px 6px 0 0;font-weight:800;cursor:pointer}.red{background:#d71920;color:white}.blue{background:#dbeafe;color:#174ea6}.green{background:#dcfce7;color:#166534}.gray{background:#f3f4f6}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:14px}.stat b{font-size:26px;display:block}.tabs button{background:#eef2f7}.tabs .on{background:#152033;color:white}.table{overflow:auto;max-height:620px;border:1px solid #e5e7eb;border-radius:16px}table{border-collapse:collapse;width:100%;min-width:850px}th,td{border-bottom:1px solid #eef2f7;padding:10px;text-align:left;font-size:13px;vertical-align:top}th{position:sticky;top:0;background:#f8fafc}.log{white-space:pre-wrap;background:#0f172a;color:#d1fae5;border-radius:14px;padding:12px;font-size:12px;margin-top:12px}.empty{padding:50px;text-align:center;color:#667085;border:1px dashed #cbd5e1;border-radius:16px}.num{font-weight:900;color:#d71920}.blueText{font-weight:900;color:#1d4ed8}.small{font-size:12px;color:#667085}@media(max-width:900px){.box{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}</style></head><body><header><h1>双色球历史开奖号码共现分析工具 🔴🔵</h1><p>上传历史开奖表，统计同一期里同时出现的 3 个、4 个、5 个号码组合，输出出现次数、出现期号、最近期号，并可下载 Excel。</p></header><div class='box'><section class='card'><h2>① 放入表格</h2><div class='drop' id='drop'><b>点击上传 Excel / CSV</b><p class='small'>支持 2003 年至今的历史开奖数据，也支持后续手动追加。</p><input id='file' type='file' accept='.xlsx,.xls,.csv' style='display:none'></div><label>工作表</label><select id='sheet'><option>先上传文件</option></select><label>统计范围</label><select id='mode'><option value='red'>只统计红球号码，推荐</option><option value='color'>红球加蓝球，区分颜色</option><option value='plain'>红球加蓝球，不区分颜色</option></select><label>显示前 N 条</label><input id='topn' type='number' value='10' min='1'><label>最少出现次数</label><input id='minc' type='number' value='1' min='1'><label>手动输入或追加数据</label><textarea id='manual' placeholder='每行一条：期号,日期,01 02 03 04 05 06 + 07'></textarea><button class='red' id='go'>开始统计</button><button class='blue' id='manualGo'>分析手动数据</button><button class='green' id='down'>下载结果 Excel</button><button class='gray' id='clear'>清空</button><div class='log' id='log'>等待上传表格。</div></section><main><div class='stats'><div class='stat'><b id='s0'>0</b><span>识别期数</span></div><div class='stat'><b id='s3'>0</b><span>3号码组合</span></div><div class='stat'><b id='s4'>0</b><span>4号码组合</span></div><div class='stat'><b id='s5'>0</b><span>5号码组合</span></div></div><section class='card'><h2>② 高频组合前 N 名</h2><div class='tabs'><button class='on' data-k='3'>3 个号码同时出现</button><button data-k='4'>4 个号码同时出现</button><button data-k='5'>5 个号码同时出现</button></div><label>搜索组合或期号</label><input id='q' placeholder='例如 01-02-03 或 2023001'><div id='out' class='empty'>暂无结果。</div></section></main></div><script>let wb=null,rows=[],records=[],res={3:[],4:[],5:[]},cur=3;let $=x=>document.getElementById(x);let log=x=>$('log').textContent=x;function cell(x){return String(x==null?'':x).trim()}function nums(x){let s=cell(x);if(!s)return[];if(/^[0-9]{4,}$/.test(s))return[];if(/^[0-9]{4}[-/.]/.test(s))return[];let m=s.match(/[0-9]{1,2}/g)||[];return m.map(v=>parseInt(v)).filter(v=>v>=1&&v<=33).map(v=>String(v).padStart(2,'0'))}function hrow(a){let bi=0,bs=-1;for(let i=0;i<Math.min(20,a.length);i++){let t=(a[i]||[]).map(cell).join('|');let s=(/期|issue|period/i.test(t)?3:0)+(/日期|date|time/i.test(t)?2:0)+(/红|蓝|球|号码|number/i.test(t)?4:0)+(a[i]||[]).filter(cell).length/20;if(s>bs){bs=s;bi=i}}return bi}function parse(a){let hi=hrow(a),head=(a[hi]||[]).map(cell);let issue=head.findIndex(x=>/期|issue|period/i.test(x));let date=head.findIndex(x=>/日期|date|time/i.test(x));let blue=[],red=[],num=[];head.forEach((x,i)=>{if(i==issue||i==date)return;if(/蓝|blue/i.test(x)){blue.push(i);num.push(i)}else if(/红|球|号码|number|num|开奖号/i.test(x)){red.push(i);num.push(i)}});if(!num.length)num=head.map((_,i)=>i).filter(i=>i!=issue&&i!=date);let out=[];for(let r=hi+1;r<a.length;r++){let row=a[r]||[];if(row.every(x=>!cell(x)))continue;let rr=[],bb=[];if(red.length||blue.length){red.forEach(i=>rr.push(...nums(row[i])));blue.forEach(i=>bb.push(...nums(row[i]).filter(v=>parseInt(v)<=16)))}else num.forEach(i=>rr.push(...nums(row[i])));rr=[...new Set(rr)].sort((a,b)=>a-b);bb=[...new Set(bb)].sort((a,b)=>a-b);if(rr.length>=5||rr.length+bb.length>=5)out.push({issue:issue>=0?cell(row[issue]):String(out.length+1),date:date>=0?cell(row[date]):'',red:rr,blue:bb})}return out}function parseManual(){let out=[];$('manual').value.split(/
/).forEach(line=>{line=cell(line);if(!line)return;let p=line.split(/[,，	]/).map(cell).filter(Boolean);let issue='',date='',txt=line;if(p.length>=3){issue=p[0];date=p[1];txt=p.slice(2).join(' ')}let z=txt.split(/[+＋]/);let rr=nums(z[0]).slice(0,6),bb=z[1]?nums(z[1]).filter(v=>parseInt(v)<=16).slice(0,1):[];if(rr.length>=5)out.push({issue:issue||String(out.length+1),date,red:[...new Set(rr)].sort((a,b)=>a-b),blue:bb})});return out}function chosen(r){let m=$('mode').value;if(m=='red')return r.red.map(x=>'R'+x);if(m=='color')return r.red.map(x=>'R'+x).concat(r.blue.map(x=>'B'+x));return [...new Set(r.red.concat(r.blue))].sort((a,b)=>a-b).map(x=>'N'+x)}function comb(a,k,s=0,p=[],o=[]){if(p.length==k){o.push(p.slice());return o}for(let i=s;i<=a.length-(k-p.length);i++){p.push(a[i]);comb(a,k,i+1,p,o);p.pop()}return o}function label(c){return c.map(x=>x[0]=='B'?'蓝'+x.slice(1):x.slice(1)).join('-')}function run(rec){records=rec;let maps={3:new Map(),4:new Map(),5:new Map()};for(let r of records){let a=chosen(r);[3,4,5].forEach(k=>{if(a.length>=k)comb(a,k).forEach(c=>{let key=c.join('|');if(!maps[k].has(key))maps[k].set(key,{c,combo:label(c),count:0,issues:[],dates:[]});let v=maps[k].get(key);v.count++;v.issues.push(r.issue);if(r.date)v.dates.push(r.date)})})}let min=parseInt($('minc').value||1);[3,4,5].forEach(k=>{res[k]=[...maps[k].values()].filter(x=>x.count>=min).sort((a,b)=>b.count-a.count||a.combo.localeCompare(b.combo,'zh',{numeric:true}));res[k].forEach((x,i)=>{x.rank=i+1;x.issueList=x.issues.join('、');x.dateList=[...new Set(x.dates)].join('、');x.lastIssue=x.issues[x.issues.length-1]||'';x.lastDate=x.dates[x.dates.length-1]||''})});$('s0').textContent=records.length;$('s3').textContent=res[3].length;$('s4').textContent=res[4].length;$('s5').textContent=res[5].length;draw();log('分析完成。识别期数：'+records.length+'\n3号码组合：'+res[3].length+'\n4号码组合：'+res[4].length+'\n5号码组合：'+res[5].length)}function esc(s){return cell(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function paint(s){return esc(s).replace(/蓝[0-9]{2}/g,m=>'<span class=blueText>'+m+'</span>').replace(/(^|-)([0-9]{2})/g,(m,a,b)=>a+'<span class=num>'+b+'</span>')}function draw(){let n=parseInt($('topn').value||10),q=cell($('q').value).toLowerCase();let a=res[cur]||[];if(q)a=a.filter(x=>x.combo.toLowerCase().includes(q)||x.issueList.toLowerCase().includes(q));a=a.slice(0,n);if(!a.length){$('out').className='empty';$('out').textContent='没有符合条件的结果。';return}$('out').className='table';$('out').innerHTML='<table><thead><tr><th>排名</th><th>号码组合</th><th>出现次数</th><th>最近期号</th><th>最近日期</th><th>出现期号</th></tr></thead><tbody>'+a.map(x=>'<tr><td>'+x.rank+'</td><td>'+paint(x.combo)+'</td><td><b>'+x.count+' 次</b></td><td>'+esc(x.lastIssue)+'</td><td>'+esc(x.lastDate)+'</td><td class=small>'+esc(x.issueList)+'</td></tr>').join('')+'</tbody></table>'}function exportX(){let book=XLSX.utils.book_new(),n=parseInt($('topn').value||10);[3,4,5].forEach(k=>{let data=res[k].map(x=>({'排名':x.rank,'号码组合':x.combo,'出现次数':x.count,'最近期号':x.lastIssue,'最近日期':x.lastDate,'出现期号':x.issueList,'出现日期':x.dateList}));XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data.slice(0,n)),k+'号码Top'+n);XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data),k+'号码全量')});XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(records.map(x=>({'期号':x.issue,'日期':x.date,'红球':x.red.join(' '),'蓝球':x.blue.join(' ')}))),'识别数据');XLSX.writeFile(book,'双色球号码共现分析结果.xlsx')}async function load(f){let b=await f.arrayBuffer();wb=XLSX.read(b,{type:'array',cellDates:true});$('sheet').innerHTML='';wb.SheetNames.forEach(s=>{$('sheet').innerHTML+='<option>'+s+'</option>'});read();log('已上传：'+f.name+'\n选择工作表后点击开始统计。')}function read(){let ws=wb.Sheets[$('sheet').value];rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true})}$('drop').onclick=()=>$('file').click();$('file').onchange=e=>e.target.files[0]&&load(e.target.files[0]);$('sheet').onchange=()=>{read();log('已切换工作表：'+$('sheet').value)};$('go').onclick=()=>{if(!rows.length){log('请先上传表格。');return}let r=parse(rows);if(!r.length){log('未识别到开奖数据，请检查表头是否含期号、日期、红球、蓝球或开奖号码。');return}run(r)};$('manualGo').onclick=()=>{let r=parseManual();if(!r.length){log('未识别到手动数据。');return}run(r)};$('down').onclick=exportX;$('clear').onclick=()=>location.reload();$('q').oninput=draw;$('topn').oninput=draw;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cur=parseInt(b.dataset.k);draw()});</script></body></html>
