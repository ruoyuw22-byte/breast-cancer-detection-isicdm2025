<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>双色球共现分析工具V4</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;background:#f4f7fb;margin:0;color:#122033}.wrap{max-width:1180px;margin:auto;padding:28px}h1{text-align:center;font-size:34px}.sub{text-align:center;color:#667085;font-size:18px}.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}.card{background:white;border:1px solid #dfe7f2;border-radius:20px;padding:20px;box-shadow:0 12px 35px #0001}.upload{border:2px dashed #bdd0e6;border-radius:16px;padding:18px;background:#f8fbff;text-align:center}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #c9d5e6;border-radius:12px;padding:11px;margin-top:6px;font-size:15px}textarea{height:110px}label{font-weight:800;margin-top:12px;display:block}.file{background:#111827;color:#fff;border:0;margin-top:12px}button{border:0;border-radius:12px;padding:11px 14px;font-weight:900;margin:10px 6px 0 0;cursor:pointer}.red{background:#df1f44;color:white}.blue{background:#2675e8;color:white}.green{background:#17a66f;color:white}.dark{background:#111827;color:white}.gray{background:#e9eef6}.log{background:#081426;color:#c9ffde;border-radius:14px;padding:12px;white-space:pre-wrap;margin-top:12px;font-size:13px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{background:white;border:1px solid #dfe7f2;border-radius:16px;padding:14px}.stat b{font-size:30px;display:block}.tabs button{background:#e9eef6}.tabs .on{background:#111827;color:#fff}.empty{border:1px dashed #cbd5e1;border-radius:16px;min-height:150px;display:grid;place-items:center;color:#667085}.table{overflow:auto;max-height:620px;border:1px solid #dfe7f2;border-radius:16px}table{border-collapse:collapse;width:100%;min-width:900px}th,td{padding:10px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc;position:sticky;top:0}.rn{color:#df1f44;font-weight:900}.bn{color:#2675e8;font-weight:900}.small{font-size:12px;color:#667085}@media(max-width:850px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class="wrap"><h1>双色球历史开奖号码共现分析工具 🔴🔵</h1><p class="sub">上传Excel，统计同一期内3个、4个、5个号码同时出现次数最多的组合，并导出Excel。</p><div class="grid"><div class="card"><h2>① 放入表格</h2><div class="upload"><b>上传 Excel / CSV</b><p>直接点下面文件按钮选择表格</p><input id="file" class="file" type="file" accept=".xlsx,.xls,.csv"></div><label>工作表</label><select id="sheet"><option>先上传文件</option></select><label>统计范围</label><select id="mode"><option value="red">只统计红球号码，推荐</option><option value="color">红球 + 蓝球，区分颜色</option><option value="plain">红球 + 蓝球，不区分颜色</option></select><label>显示前N条</label><input id="topn" type="number" value="10" min="1"><label>最少出现次数</label><input id="minc" type="number" value="1" min="1"><label>手动输入或追加数据</label><textarea id="manual" placeholder="每行一条：期号,日期,01 02 03 04 05 06 + 07"></textarea><button class="red" id="go">开始统计</button><button class="blue" id="manualGo">只分析手动数据</button><button class="green" id="appendGo">追加手动数据后统计</button><button class="gray" id="demo">试用示例数据</button><button class="dark" id="down">下载结果Excel</button><button class="gray" id="clear">清空</button><div id="log" class="log">V4已加载。等待上传表格。</div></div><div><div class="stats"><div class="stat"><b id="s0">0</b>识别期数</div><div class="stat"><b id="s3">0</b>3号码组合</div><div class="stat"><b id="s4">0</b>4号码组合</div><div class="stat"><b id="s5">0</b>5号码组合</div></div><div class="card"><h2>② 高频组合前N名</h2><div class="tabs"><button class="on" data-k="3">3个号码同时出现</button><button data-k="4">4个号码同时出现</button><button data-k="5">5个号码同时出现</button></div><label>搜索组合或期号</label><input id="q" placeholder="例如 01-02-03 或 2023001"><br><br><div id="out" class="empty">暂无结果。</div></div></div></div></div><script>var wb=null,rows=[],records=[],res={3:[],4:[],5:[]},cur=3;function $(id){return document.getElementById(id)}function log(t){$('log').textContent=t}function cell(x){if(x instanceof Date)return x.toISOString().slice(0,10);return String(x==null?'':x).trim()}function pad(n){return String(n).padStart(2,'0')}function dateLike(s){s=cell(s);return /^\d{4}[-/.年]/.test(s)||/^\d{1,2}[-/.月]\d{1,2}/.test(s)}function excelDate(n){if(typeof n==='number'&&n>20000&&n<60000){var d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().slice(0,10)}return''}function issueFromRow(row){for(var i=0;i<Math.min(row.length,4);i++){var s=cell(row[i]),m=s.match(/\b\d{6,8}\b/);if(m&&parseInt(m[0])>100000)return m[0]}return''}function dateFromRow(row){for(var i=0;i<Math.min(row.length,5);i++){var v=row[i],s=cell(v);if(v instanceof Date)return cell(v);if(dateLike(s))return s;var ed=excelDate(v);if(ed)return ed}return''}function numsFromCell(v){if(v instanceof Date)return[];if(typeof v==='number'){if(Number.isInteger(v)&&v>=1&&v<=33)return[pad(v)];return[]}var s=cell(v);if(!s||dateLike(s))return[];if(/^\d{6,8}$/.test(s))return[];var arr=s.match(/\d{1,2}/g)||[];return arr.map(function(x){return parseInt(x,10)}).filter(function(n){return n>=1&&n<=33}).map(pad)}function parseRows(a){var out=[];for(var r=0;r<a.length;r++){var row=a[r]||[],txt=row.map(cell).join('|');if(!txt.trim())continue;var issue=issueFromRow(row),isHeader=/双色球|历史|汇总|期号|日期|红球|蓝球|开奖号码|号码|#1|#2|#3|#4|#5|#6/i.test(txt),ns=[];for(var c=0;c<row.length;c++){var s=cell(row[c]);if(issue&&s.indexOf(issue)>=0)continue;if(dateLike(s))continue;if(excelDate(row[c]))continue;ns=ns.concat(numsFromCell(row[c]))}if(isHeader&&!issue)continue;var u=[];ns.forEach(function(x){if(u.indexOf(x)<0)u.push(x)});if(u.length>=6){var red=u.slice(0,6).sort(function(a,b){return +a-+b}),blue=[];if(u.length>=7&&+u[6]>=1&&+u[6]<=16)blue=[u[6]];out.push({issue:issue||String(out.length+1),date:dateFromRow(row),red:red,blue:blue})}}return out}function parseManual(){var out=[];$('manual').value.split(/\n+/).forEach(function(line){line=cell(line);if(!line)return;var p=line.split(/[，,\t]/).map(cell).filter(Boolean),issue='',date='',txt=line;if(p.length>=3){issue=p[0];date=p[1];txt=p.slice(2).join(' ')}var sp=txt.split(/[+＋]/),red=numsFromCell(sp[0]).slice(0,6).sort(function(a,b){return +a-+b}),blue=sp[1]?numsFromCell(sp[1]).filter(function(x){return +x<=16}).slice(0,1):[];if(red.length>=5)out.push({issue:issue||String(out.length+1),date:date,red:red,blue:blue})});return out}function chosen(r){var m=$('mode').value;if(m==='red')return r.red.map(function(x){return'R'+x});if(m==='color')return r.red.map(function(x){return'R'+x}).concat(r.blue.map(function(x){return'B'+x}));return Array.from(new Set(r.red.concat(r.blue))).sort(function(a,b){return +a-+b}).map(function(x){return'N'+x})}function comb(a,k,s,p,o){s=s||0;p=p||[];o=o||[];if(p.length===k){o.push(p.slice());return o}for(var i=s;i<=a.length-(k-p.length);i++){p.push(a[i]);comb(a,k,i+1,p,o);p.pop()}return o}function comboLabel(c){return c.map(function(x){return x[0]==='B'?'蓝'+x.slice(1):x.slice(1)}).join('-')}function analyze(list){records=list;var maps={3:new Map(),4:new Map(),5:new Map()};records.forEach(function(rec){var arr=chosen(rec);[3,4,5].forEach(function(k){if(arr.length>=k)comb(arr,k).forEach(function(c){var key=c.join('|');if(!maps[k].has(key))maps[k].set(key,{combo:comboLabel(c),count:0,issues:[],dates:[]});var v=maps[k].get(key);v.count++;v.issues.push(rec.issue);if(rec.date)v.dates.push(rec.date)})})});var min=parseInt($('minc').value||1);[3,4,5].forEach(function(k){res[k]=Array.from(maps[k].values()).filter(function(x){return x.count>=min}).sort(function(a,b){return b.count-a.count||a.combo.localeCompare(b.combo,'zh',{numeric:true})});res[k].forEach(function(x,i){x.rank=i+1;x.issueList=x.issues.join('、');x.dateList=Array.from(new Set(x.dates)).join('、');x.lastIssue=x.issues[x.issues.length-1]||'';x.lastDate=x.dates[x.dates.length-1]||''})});$('s0').textContent=records.length;$('s3').textContent=res[3].length;$('s4').textContent=res[4].length;$('s5').textContent=res[5].length;draw();log('分析完成。\n识别开奖期数：'+records.length+'\n3号码组合：'+res[3].length+'\n4号码组合：'+res[4].length+'\n5号码组合：'+res[5].length)}function esc(s){return cell(s).replace(/[&<>]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[m]})}function paint(s){return esc(s).replace(/蓝\d{2}/g,function(m){return'<span class="bn">'+m+'</span>'}).replace(/(^|-)(\d{2})/g,function(m,a,b){return a+'<span class="rn">'+b+'</span>'})}function draw(){var n=parseInt($('topn').value||10),q=cell($('q').value).toLowerCase(),arr=res[cur]||[];if(q)arr=arr.filter(function(x){return x.combo.toLowerCase().indexOf(q)>=0||x.issueList.toLowerCase().indexOf(q)>=0});arr=arr.slice(0,n);if(!arr.length){$('out').className='empty';$('out').textContent='暂无结果。';return}$('out').className='table';$('out').innerHTML='<table><thead><tr><th>排名</th><th>号码组合</th><th>出现次数</th><th>最近期号</th><th>最近日期</th><th>出现期号</th></tr></thead><tbody>'+arr.map(function(x){return'<tr><td>'+x.rank+'</td><td><b>'+paint(x.combo)+'</b></td><td>'+x.count+' 次</td><td>'+esc(x.lastIssue)+'</td><td>'+esc(x.lastDate)+'</td><td class="small">'+esc(x.issueList)+'</td></tr>'}).join('')+'</tbody></table>'}function exportX(){if(!records.length){log('没有可导出的结果，请先统计。');return}var book=XLSX.utils.book_new(),n=parseInt($('topn').value||10);[3,4,5].forEach(function(k){var data=res[k].map(function(x){return{'排名':x.rank,'号码组合':x.combo,'出现次数':x.count,'最近期号':x.lastIssue,'最近开奖日期':x.lastDate,'出现期号':x.issueList,'出现日期':x.dateList}});XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data.slice(0,n)),k+'号码前'+n+'名');XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data),k+'号码全量')});XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(records.map(function(x){return{'期号':x.issue,'开奖日期':x.date,'红球':x.red.join(' '),'蓝球':x.blue.join(' ')}})),'识别数据');XLSX.writeFile(book,'双色球号码共现分析结果.xlsx')}async function loadFile(f){try{if(!window.XLSX){log('Excel解析库未加载成功，请刷新网页。');return}var buf=await f.arrayBuffer();wb=XLSX.read(buf,{type:'array',cellDates:true});$('sheet').innerHTML='';wb.SheetNames.forEach(function(s){$('sheet').innerHTML+='<option>'+s+'</option>'});readSheet();log('已上传：'+f.name+'\n已读取工作表：'+$('sheet').value+'\n点击“开始统计”。')}catch(e){log('读取文件失败：'+e.message)}}function readSheet(){if(!wb)return;rows=XLSX.utils.sheet_to_json(wb.Sheets[$('sheet').value],{header:1,defval:'',raw:true})}document.addEventListener('DOMContentLoaded',function(){$('file').addEventListener('change',function(e){if(e.target.files&&e.target.files[0])loadFile(e.target.files[0])});$('sheet').onchange=function(){readSheet();log('已切换工作表：'+$('sheet').value)};$('go').onclick=function(){if(!rows.length){log('请先上传表格。');return}var r=parseRows(rows);if(!r.length)log('仍未识别到开奖数据。请把表头或前5行截图发我，我按你的表格固定适配。');else analyze(r)};$('manualGo').onclick=function(){var r=parseManual();if(!r.length)log('未识别到手动数据。');else analyze(r)};$('appendGo').onclick=function(){var base=rows.length?parseRows(rows):[],extra=parseManual();if(!base.length&&!extra.length)log('请先上传表格或输入手动数据。');else analyze(base.concat(extra))};$('down').onclick=exportX;$('clear').onclick=function(){location.reload()};$('q').oninput=draw;$('topn').oninput=draw;$('minc').onchange=function(){if(records.length)analyze(records)};$('mode').onchange=function(){if(records.length)analyze(records)};document.querySelectorAll('.tabs button').forEach(function(b){b.onclick=function(){document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');cur=parseInt(b.dataset.k);draw()}});$('demo').onclick=function(){analyze([{issue:'2025001',date:'2025-01-02',red:['01','06','12','18','26','31'],blue:['09']},{issue:'2025002',date:'2025-01-05',red:['01','06','13','18','22','31'],blue:['04']},{issue:'2025003',date:'2025-01-09',red:['01','06','12','19','26','31'],blue:['11']},{issue:'2025004',date:'2025-01-12',red:['02','06','12','18','26','31'],blue:['09']}])}});</script></body></html>
