<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>双色球历史开奖号码共现分析工具</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>if(!window.XLSX){document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"><\/script>')}</script>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#122033;--muted:#667085;--line:#d8e0ec;--dark:#10192b;--red:#d9203f;--blue:#236fe5;--green:#16a36b;}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f7f8fc,#eef2f7);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text)}
.wrap{max-width:1320px;margin:auto;padding:36px 22px 46px}.head{text-align:center;margin-bottom:28px}.head h1{font-size:38px;margin:0 0 16px;font-weight:900;letter-spacing:-1px}.head p{font-size:20px;line-height:1.7;color:#667085;margin:0}.layout{display:grid;grid-template-columns:360px 1fr;gap:20px}.card{background:var(--card);border:1px solid #e3e8f1;border-radius:22px;box-shadow:0 18px 55px rgba(15,23,42,.08);padding:20px}.card h2{font-size:30px;margin:0 0 22px;font-weight:900}.upload{border:2px dashed #c8d3e3;background:#f8fafc;border-radius:18px;padding:20px;text-align:center;margin-bottom:16px}.upload-title{font-size:22px;font-weight:900;margin-bottom:8px}.file-input{display:block;width:100%;border:2px solid #112033;background:#112033;color:white;border-radius:14px;padding:14px;cursor:pointer;margin-top:14px;font-size:15px}.hint{font-size:13px;line-height:1.6;color:#667085}label{display:block;font-size:14px;font-weight:800;margin:14px 0 6px}select,input,textarea{width:100%;border:1px solid #cfd8e6;border-radius:14px;padding:12px 13px;background:white;color:#111827;font-size:15px;outline:none}textarea{min-height:120px;resize:vertical}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:13px;padding:12px 14px;font-size:15px;font-weight:900;cursor:pointer}.btn-dark{background:#111827;color:white}.btn-red{background:var(--red);color:white}.btn-blue{background:var(--blue);color:white}.btn-green{background:var(--green);color:white}.btn-gray{background:#edf1f7;color:#142033}.log{background:#0d1628;color:#c8ffdf;border-radius:14px;padding:12px;white-space:pre-wrap;font-size:12px;line-height:1.6;margin-top:14px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.stat{background:white;border:1px solid #e3e8f1;border-radius:18px;padding:18px}.stat b{font-size:34px;display:block}.stat span{font-size:15px;font-weight:800}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.tab{background:#edf1f7;color:#111827}.tab.active{background:#111827;color:white}.search{max-width:520px;margin-bottom:14px}.empty{height:170px;display:grid;place-items:center;border:1px dashed #cbd5e1;border-radius:16px;color:#667085;background:#fafcff;font-size:18px}.table-box{overflow:auto;max-height:650px;border:1px solid #dbe3ee;border-radius:16px;background:white}table{border-collapse:collapse;width:100%;min-width:980px}th,td{padding:12px;border-bottom:1px solid #edf1f7;text-align:left;vertical-align:top;font-size:14px}th{position:sticky;top:0;background:#f8fafc;z-index:1}.rank{font-weight:900;color:#9a6510}.combo{font-weight:900;font-size:16px}.redText{color:var(--red)}.blueText{color:var(--blue)}.count{font-size:18px;font-weight:900}.small{font-size:12px;color:#667085;line-height:1.6}.balls{display:inline-flex;gap:6px;vertical-align:middle}.ball{display:inline-grid;place-items:center;width:36px;height:36px;border-radius:50%;color:white;font-weight:900}.br{background:linear-gradient(145deg,#ff4b66,#c91532)}.bb{background:linear-gradient(145deg,#4c9cff,#155dcc)}.footer{text-align:center;color:#7b8798;font-size:13px;margin-top:22px;line-height:1.6}@media(max-width:900px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.head h1{font-size:30px}.head p{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>双色球历史开奖号码共现分析工具 <span class="balls"><span class="ball br">红</span><span class="ball bb">蓝</span></span></h1>
    <p>上传历史开奖表，统计同一期里同时出现的 3 个、4 个、5 个号码组合，输出出现次数、出现期号、最近期号，并可下载 Excel。</p>
  </div>
  <div class="layout">
    <aside class="card">
      <h2>① 放入表格</h2>
      <div class="upload">
        <div class="upload-title">点击下面按钮上传 Excel / CSV</div>
        <div class="hint">支持 2003 年至今的历史开奖数据，也支持后续手动追加。这里使用原生文件按钮，避免网页预览环境里点击无反应。</div>
        <input id="file" class="file-input" type="file" accept=".xlsx,.xls,.csv">
      </div>
      <label>工作表</label><select id="sheet"><option>先上传文件</option></select>
      <label>统计范围</label><select id="mode"><option value="red">只统计红球号码，推荐</option><option value="color">红球 + 蓝球，区分颜色</option><option value="plain">红球 + 蓝球，不区分颜色</option></select>
      <label>显示前 N 条</label><input id="topn" type="number" value="10" min="1">
      <label>最少出现次数</label><input id="minc" type="number" value="1" min="1">
      <label>手动输入或追加数据</label><textarea id="manual" placeholder="每行一条：期号,日期,01 02 03 04 05 06 + 07"></textarea>
      <div class="btns"><button class="btn-red" id="go">开始统计</button><button class="btn-blue" id="manualGo">只分析手动数据</button><button class="btn-green" id="appendGo">追加手动数据后统计</button><button class="btn-gray" id="demo">试用示例数据</button><button class="btn-gray" id="clear">清空</button></div>
      <div class="btns"><button class="btn-dark" id="down">下载结果 Excel</button></div>
      <div class="log" id="log">等待上传表格。若“点击上传”无反应，请直接点击黑色原生文件按钮。</div>
    </aside>
    <main>
      <div class="stats"><div class="stat"><b id="s0">0</b><span>识别期数</span></div><div class="stat"><b id="s3">0</b><span>3号码组合</span></div><div class="stat"><b id="s4">0</b><span>4号码组合</span></div><div class="stat"><b id="s5">0</b><span>5号码组合</span></div></div>
      <section class="card"><h2>② 高频组合前 N 名</h2><div class="tabs"><button class="tab active" data-k="3">3 个号码同时出现</button><button class="tab" data-k="4">4 个号码同时出现</button><button class="tab" data-k="5">5 个号码同时出现</button></div><div class="search"><label>搜索组合或期号</label><input id="q" placeholder="例如 01-02-03 或 2023001"></div><div id="out" class="empty">暂无结果。</div></section>
    </main>
  </div>
  <div class="footer">说明：网页只在浏览器本地读取和分析 Excel，不把数据上传到服务器。可直接把网址发给别人使用。</div>
</div>
<script>
let wb=null, rows=[], records=[], res={3:[],4:[],5:[]}, cur=3; const $=id=>document.getElementById(id); const log=t=>$('log').textContent=t;
function cell(x){ if(x instanceof Date) return x.toISOString().slice(0,10); return String(x==null?'':x).trim(); }
function isDateLike(s){s=cell(s); return /^\d{4}[-/.年]/.test(s) || /^\d{8}$/.test(s)}
function nums(x,max=33){let s=cell(x); if(!s||isDateLike(s))return[]; let m=s.match(/\d{1,2}/g)||[]; return m.map(v=>parseInt(v,10)).filter(v=>v>=1&&v<=max).map(v=>String(v).padStart(2,'0'));}
function hrow(a){let best=0,score=-1; for(let i=0;i<Math.min(25,a.length);i++){let arr=(a[i]||[]).map(cell), t=arr.join('|');let s=arr.filter(Boolean).length*0.15; if(/期|issue|period/i.test(t))s+=3;if(/日期|date|time/i.test(t))s+=2;if(/红|蓝|球|号码|number|开奖号/i.test(t))s+=6;if(s>score){score=s;best=i;}} return best;}
function parse(a){let hi=hrow(a), head=(a[hi]||[]).map(cell); let issue=head.findIndex(x=>/期|issue|period/i.test(x)); let date=head.findIndex(x=>/日期|date|time/i.test(x)); let red=[],blue=[],num=[]; head.forEach((x,i)=>{if(i===issue||i===date)return; if(/蓝|blue/i.test(x)){blue.push(i);num.push(i)} else if(/红|球|号码|number|num|开奖号/i.test(x)){red.push(i);num.push(i)}}); if(!num.length)num=head.map((_,i)=>i).filter(i=>i!==issue&&i!==date); let out=[]; for(let r=hi+1;r<a.length;r++){let row=a[r]||[]; if(row.every(x=>!cell(x)))continue; let rr=[],bb=[]; if(red.length||blue.length){red.forEach(i=>rr.push(...nums(row[i],33))); blue.forEach(i=>bb.push(...nums(row[i],16)));} else num.forEach(i=>rr.push(...nums(row[i],33))); rr=[...new Set(rr)].filter(x=>+x<=33).sort((a,b)=>+a-+b); bb=[...new Set(bb)].filter(x=>+x<=16).sort((a,b)=>+a-+b); if(rr.length>=5||rr.length+bb.length>=5)out.push({issue:issue>=0?cell(row[issue]):String(out.length+1),date:date>=0?cell(row[date]):'',red:rr,blue:bb}); } return out;}
function parseManual(){let out=[]; $('manual').value.split(/\n+/).forEach(line=>{line=cell(line); if(!line)return; let p=line.split(/[，,\t]/).map(cell).filter(Boolean), issue='',date='',txt=line; if(p.length>=3){issue=p[0];date=p[1];txt=p.slice(2).join(' ')} let z=txt.split(/[+＋]/); let rr=nums(z[0],33).slice(0,6), bb=z[1]?nums(z[1],16).slice(0,1):[]; rr=[...new Set(rr)].sort((a,b)=>+a-+b); bb=[...new Set(bb)].sort((a,b)=>+a-+b); if(rr.length>=5)out.push({issue:issue||String(out.length+1),date,red:rr,blue:bb});}); return out;}
function chosen(r){let m=$('mode').value; if(m==='red')return r.red.map(x=>'R'+x); if(m==='color')return r.red.map(x=>'R'+x).concat(r.blue.map(x=>'B'+x)); return [...new Set(r.red.concat(r.blue))].sort((a,b)=>+a-+b).map(x=>'N'+x);}
function comb(a,k,s=0,p=[],o=[]){if(p.length===k){o.push(p.slice());return o;} for(let i=s;i<=a.length-(k-p.length);i++){p.push(a[i]);comb(a,k,i+1,p,o);p.pop();} return o;}
function label(c){return c.map(x=>x[0]==='B'?'蓝'+x.slice(1):x.slice(1)).join('-');}
function analyze(rec){records=rec; let maps={3:new Map(),4:new Map(),5:new Map()}; for(let r of records){let a=chosen(r); [3,4,5].forEach(k=>{if(a.length>=k)comb(a,k).forEach(c=>{let key=c.join('|'); if(!maps[k].has(key))maps[k].set(key,{c,combo:label(c),count:0,issues:[],dates:[]}); let v=maps[k].get(key); v.count++; v.issues.push(r.issue); if(r.date)v.dates.push(r.date);});});} let min=parseInt($('minc').value||1,10); [3,4,5].forEach(k=>{res[k]=[...maps[k].values()].filter(x=>x.count>=min).sort((a,b)=>b.count-a.count||a.combo.localeCompare(b.combo,'zh',{numeric:true})); res[k].forEach((x,i)=>{x.rank=i+1;x.issueList=x.issues.join('、');x.dateList=[...new Set(x.dates)].join('、');x.lastIssue=x.issues[x.issues.length-1]||'';x.lastDate=x.dates[x.dates.length-1]||'';});}); $('s0').textContent=records.length;$('s3').textContent=res[3].length;$('s4').textContent=res[4].length;$('s5').textContent=res[5].length;draw();log(`分析完成。识别期数：${records.length}\n3号码组合：${res[3].length}\n4号码组合：${res[4].length}\n5号码组合：${res[5].length}`);}
function esc(s){return cell(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function paint(s){return esc(s).replace(/蓝\d{2}/g,m=>`<span class="blueText">${m}</span>`).replace(/(^|-)(\d{2})/g,(m,a,b)=>`${a}<span class="redText">${b}</span>`);}
function draw(){let n=parseInt($('topn').value||10,10), q=cell($('q').value).toLowerCase(); let a=res[cur]||[]; if(q)a=a.filter(x=>x.combo.toLowerCase().includes(q)||x.issueList.toLowerCase().includes(q)); a=a.slice(0,n); if(!a.length){$('out').className='empty';$('out').textContent='暂无结果。';return;} $('out').className='table-box'; $('out').innerHTML='<table><thead><tr><th>排名</th><th>号码组合</th><th>出现次数</th><th>最近期号</th><th>最近日期</th><th>出现期号</th></tr></thead><tbody>'+a.map(x=>`<tr><td class="rank">${x.rank}</td><td class="combo">${paint(x.combo)}</td><td class="count">${x.count} 次</td><td>${esc(x.lastIssue)}</td><td>${esc(x.lastDate)}</td><td class="small">${esc(x.issueList)}</td></tr>`).join('')+'</tbody></table>';}
function exportX(){if(!records.length){log('没有可导出的结果，请先统计。');return;} let book=XLSX.utils.book_new(), n=parseInt($('topn').value||10,10); [3,4,5].forEach(k=>{let data=res[k].map(x=>({'排名':x.rank,'号码组合':x.combo,'出现次数':x.count,'最近期号':x.lastIssue,'最近开奖日期':x.lastDate,'出现期号':x.issueList,'出现日期':x.dateList})); XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data.slice(0,n)),`${k}号码前${n}名`); XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(data),`${k}号码全量`);}); XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(records.map(x=>({'期号':x.issue,'开奖日期':x.date,'红球':x.red.join(' '),'蓝球':x.blue.join(' ')}))),'识别数据'); XLSX.writeFile(book,'双色球号码共现分析结果.xlsx');}
async function load(f){try{if(!window.XLSX){log('Excel 解析库没有加载成功，请刷新页面或换浏览器。');return;} let b=await f.arrayBuffer(); wb=XLSX.read(b,{type:'array',cellDates:true}); $('sheet').innerHTML=''; wb.SheetNames.forEach(s=>{$('sheet').innerHTML+=`<option>${s}</option>`}); read(); log(`已上传：${f.name}\n请选择工作表后点击“开始统计”。`);}catch(e){log('读取文件失败：'+e.message);}}
function read(){if(!wb)return; let ws=wb.Sheets[$('sheet').value]; rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});}
$('file').addEventListener('change',e=>{if(e.target.files&&e.target.files[0])load(e.target.files[0]);}); $('sheet').onchange=()=>{read();log('已切换工作表：'+$('sheet').value);}; $('go').onclick=()=>{if(!rows.length){log('请先上传表格。');return;} let r=parse(rows); if(!r.length){log('未识别到开奖数据，请检查表头是否含期号、日期、红球、蓝球或开奖号码。');return;} analyze(r);}; $('manualGo').onclick=()=>{let r=parseManual(); if(!r.length){log('未识别到手动数据。');return;} analyze(r);}; $('appendGo').onclick=()=>{let base=rows.length?parse(rows):[], extra=parseManual(); if(!base.length&&!extra.length){log('请先上传表格或输入手动数据。');return;} analyze(base.concat(extra));}; $('down').onclick=exportX; $('clear').onclick=()=>location.reload(); $('q').oninput=draw; $('topn').oninput=draw; $('minc').onchange=()=>{if(records.length)analyze(records)}; $('mode').onchange=()=>{if(records.length)analyze(records)}; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');cur=parseInt(b.dataset.k,10);draw();}); $('demo').onclick=()=>{analyze([{issue:'2025001',date:'2025-01-02',red:['01','06','12','18','26','31'],blue:['09']},{issue:'2025002',date:'2025-01-05',red:['01','06','13','18','22','31'],blue:['04']},{issue:'2025003',date:'2025-01-09',red:['01','06','12','19','26','31'],blue:['11']},{issue:'2025004',date:'2025-01-12',red:['02','06','12','18','26','31'],blue:['09']}]);};
</script>
</body>
</html>
